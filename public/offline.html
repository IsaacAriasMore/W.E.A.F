<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111722" />
    <title>Sin conexión | W.E.A.F</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: 24px; background: #111722; color: #f1eee8; }
      main { width: min(560px, 100%); border-top: 2px solid #d4903d; padding-top: 28px; }
      img { width: 56px; height: 56px; }
      span { display: block; margin-top: 24px; color: #d4903d; font-size: .75rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 10px 0 12px; font-size: clamp(2.4rem, 10vw, 4.6rem); line-height: .98; letter-spacing: -.04em; }
      p { color: #b3b5bb; line-height: 1.65; }
      button { min-height: 46px; margin-top: 22px; border: 0; border-radius: 999px; padding: 0 20px; background: #d4903d; color: #111722; font: inherit; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/weaf-mark.svg" alt="" />
      <span>Modo sin conexión</span>
      <h1>La red se tomó un respiro.</h1>
      <p>La estructura de W.E.A.F está disponible, pero los datos de Supabase necesitan conexión. Reintenta cuando recuperes señal.</p>
      <button type="button" onclick="window.location.reload()">Intentar de nuevo</button>
    </main>
  </body>
</html>
